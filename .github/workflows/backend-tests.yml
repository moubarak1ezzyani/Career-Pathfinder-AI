name: Backend Tests

on:
  push:
    branches: 
      - ci/github-actions-pipeline
      - develop
      - main
  pull_request:
    branches: 
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    # On injecte des fausses variables pour satisfaire config.py
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DB_USER_env: "test_user"
      DB_PASSWORD_env: "test_pass"
      DB_HOST_env: "localhost"
      DB_PORT_env: "5432"  # Le plus important pour éviter l'erreur int() !
      DB_NAME_env: "test_db"
      SECRET_KEY_env: "super-secret-key-for-testing-only"
      ALGO_env: "HS256"
      TOKEN_EXPIRE_env: "30"
      cv_me_standard_env: "dummy.pdf"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 🚀 Force Install Dependencies & Run Tests
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install PyJWT fastapi uvicorn sqlalchemy passlib bcrypt python-multipart openai sentence-transformers pytest httpx pydantic
          pip install -r requirements.txt || true
          pytest tests/ -v