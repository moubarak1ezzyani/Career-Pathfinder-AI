name: Backend Tests

on:
  push:
    branches: 
      - ci/github-actions-pipeline
      - develop
      - main
  pull_request:
    branches: 
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 💉 Inject Native GitHub Environment Variables
        run: |
          echo "DB_USER_env=test_user" >> $GITHUB_ENV
          echo "DB_PASSWORD_env=test_pass" >> $GITHUB_ENV
          echo "DB_HOST_env=localhost" >> $GITHUB_ENV
          echo "DB_PORT_env=5432" >> $GITHUB_ENV
          echo "DB_NAME_env=test_db" >> $GITHUB_ENV
          echo "SECRET_KEY_env=super-secret-key-for-testing-only" >> $GITHUB_ENV
          echo "ALGO_env=HS256" >> $GITHUB_ENV
          echo "TOKEN_EXPIRE_env=30" >> $GITHUB_ENV
          echo "cv_me_standard_env=dummy.pdf" >> $GITHUB_ENV

      - name: 👀 DEBUG - Show config.py content
        working-directory: ./backend
        run: cat app/core/config.py

      - name: 🚀 Install Dependencies & Run Tests
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install PyJWT fastapi uvicorn sqlalchemy passlib bcrypt python-multipart openai sentence-transformers pytest httpx pydantic python-dotenv
          pip install -r requirements.txt || true
          pytest tests/ -v