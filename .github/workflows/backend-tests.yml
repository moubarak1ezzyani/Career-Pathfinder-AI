name: Backend Tests

on:
  push:
    # Trigger the workflow when pushing to these branches
    branches: 
      - ci/github-actions-pipeline
      - develop
      - main
  pull_request:
    # Trigger the workflow on PRs targeting these branches
    branches: 
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Resolves the Node.js 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 🚀 Force Install Dependencies & Run Tests
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          # Explicitly install PyJWT and other core dependencies to bypass the error
          pip install PyJWT fastapi uvicorn sqlalchemy passlib bcrypt python-multipart openai sentence-transformers pytest httpx pydantic
          # Attempt to install any remaining packages from requirements.txt
          pip install -r requirements.txt || true
          # Run the tests immediately after installation
          pytest tests/ -v