version: '3.8'

services:
  # 1. DATABASE
  db:
    image: postgres:15-alpine
    container_name: career_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: career_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - career-network

  # 2. BACKEND (FastAPI)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: career_backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DB_USER_env=postgres
      - DB_PASSWORD_env=password123
      - DB_HOST_env=db
      - DB_PORT_env=5432
      - DB_NAME_env=career_db
      - OLLAMA_URL=http://host.docker.internal:11434/v1
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/uploads:/backend/uploads
    networks:
      - career-network

  # 3. FRONTEND (Next.js)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: career_frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
    networks:
      - career-network

networks:
  career-network:
    driver: bridge

volumes:
  postgres_data: